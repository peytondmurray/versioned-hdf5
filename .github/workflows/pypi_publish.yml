name: Release Python Bindings to PyPI

on:
  release:
    types: [published]
  pull_request:
  workflow_dispatch:
    inputs:
      test_pypi:
        type: boolean
        description: 'Test release: publish on test.pypi.org'
        default: false

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: 💻 Checkout the repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          generate-run-shell: true

      - name: 🚀 Install build dependencies
        run: |
          pip install build twine
        shell: micromamba-shell {0}

      - name: 📦 Build the sdist and wheel
        run: |
          python -m build --sdist -o wheelhouse
        shell: micromamba-shell {0}

      - name: List and check sdist
        run: |
          ls -lh wheelhouse/
          twine check wheelhouse/*
        shell: micromamba-shell {0}

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: ./wheelhouse/*.tar.gz

  build-wheels:
    name: 'Wheels: ${{ matrix.os }} ${{ matrix.arch }} ${{ matrix.python }}'
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: windows-latest
            arch: AMD64
          - os: macos-14
            arch: arm64
          - os: macos-13
            arch: x86_64

    steps:
    - name: Check out the repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # get the non-merge commit for PRs

    # Get HDF5 outside of cibuildwheel so that we can set env vars via GITHUB_ENV
    # inside the HDF5-getting scripts and have them be in effect for the
    # cibuildwheel step.

    # Windows HDF5
    - uses: nuget/setup-nuget@v2
      if: runner.os == 'Windows'
    - uses: actions/setup-python@v5
      if: runner.os == 'Windows'
      with:
        python-version: ${{ matrix.python-version }}
    - run: bash ./ci/cibw_before_all_windows.sh "${{ github.workspace }}"
      if: runner.os == 'Windows'

    # macOS HDF5
    - run: bash ./ci/cibw_before_all_macos.sh "${{ github.workspace }}"
      if: runner.os == 'macOS'

    - name: Setup tmate session
      if: runner.os == 'macOS'
      uses: mxschmitt/action-tmate@v3

    # Triage build
    - run: bash ./ci/triage_build.sh "${{ matrix.arch }}" "${{ github.event.pull_request.head.sha || github.sha }}" "${{ matrix.python-version }}"

    # Now actually build the wheels
    - uses: pypa/cibuildwheel@v2.22.0
      env:
        # Note that tool.cibuildwheel "skip" in pyproject.toml also limits what gets built
        CIBW_ARCHS: ${{ matrix.arch }}
        CIBW_BUILD: ${{ env.CIBW_BUILD }}
        CIBW_SKIP: ${{ env.CIBW_SKIP }}
        CIBW_BEFORE_BUILD: ${{ env.CIBW_BEFORE_BUILD }}
        CIBW_BUILD_FRONTEND: ${{ env.CIBW_BUILD_FRONTEND }}
        CIBW_PRERELEASE_PYTHONS: ${{ env.CIBW_PRERELEASE_PYTHONS }}
        CIBW_BEFORE_TEST: ${{ env.CIBW_BEFORE_TEST }}

    - run: python ./ci/bundle_hdf5_whl.py wheelhouse
      if: runner.os == 'Windows'

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
        path: ./wheelhouse/*.whl

  publish:
    name: Publish Python packages on PyPI
    if: (github.event_name == 'release' && startsWith(github.ref, 'refs/tags')) || (github.event_name == 'workflow_dispatch')
    needs: [build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/versioned-hdf5
    permissions:
      id-token: write
    steps:
      - name: Retrieve wheels and sdist
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: wheels/

      - name: print artifacts
        run: |
          ls -l wheels/

      - name: 🧪 Publish to PyPI Testing
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ inputs.test_pypi }}
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: wheels

      - name: 🎉 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ !inputs.test_pypi }}
        with:
          packages-dir: wheels
