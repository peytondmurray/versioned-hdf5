name: Release Python Bindings to PyPI

on:
  release:
    types: [published]
  pull_request:
  workflow_dispatch:
    inputs:
      test_pypi:
        type: boolean
        description: 'Test release: publish on test.pypi.org'
        default: false

jobs:
  build-sdist:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - name: 💻 Checkout the repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: conda-incubator/setup-miniconda@v3.1.0
        with:
          auto-update-conda: true
          python-version: "3.12"
          activate-environment: "build"
          channels: conda-forge

      - name: 🚀 Install build dependencies
        run: |
          pip install build twine

      - name: 📦 Build the sdist and wheel
        run: |
          python -m build --sdist -o wheelhouse

      - name: List and check sdist
        run: |
          ls -lh wheelhouse/
          twine check wheelhouse/*

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: ./wheelhouse/*.tar.gz

  build-wheels:
    name: >
      build ${{ matrix.python-version }} on ${{ matrix.platform || matrix.os }}
      ${{ (matrix.arch) || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, windows, macos]
        python-version: ['cp312']
        include:
          - os: ubuntu
            platform: linux
          - os: windows
            ls: dir

    runs-on: ${{ format('{0}-latest', matrix.os) }}
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - if: matrix.os == 'macos' || matrix.os == 'windows'
      name: 🐍 Set up Python
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-file: environment.yml
        init-shell: zsh bash powershell

    - name: Build ${{ matrix.platform || matrix.os }} binaries
      uses: pypa/cibuildwheel@v2.22.0
      env:
        CIBW_BUILD: '${{ matrix.python-version }}-*'
        CIBW_SKIP: '*-musllinux_i686'
        # CIBW_ARCHS: ${{ matrix.arch || 'auto' }}
        # CIBW_ENVIRONMENT_MACOS: "SHELL=micromamba-shell"
        # CIBW_BEFORE_BUILD_WINDOWS: "SHELL=micromamba-shell"
        # Linux wheels are built in manylinux containers; set up hdf5 and openmpi dependencies here
        CIBW_ENVIRONMENT_LINUX: PATH=/usr/lib64/openmpi/bin:$PATH
        CIBW_BEFORE_BUILD_LINUX: |
            yum install -y hdf5 hdf5-devel openmpi openmpi-devel yum-utils


        CIBW_BUILD_VERBOSITY: 1

    - name: List and check wheels
      run: |
        pip install twine pkginfo>=1.10.0
        ${{ matrix.ls || 'ls -lh' }} wheelhouse/
        twine check wheelhouse/*

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
        path: ./wheelhouse/*.whl

  publish:
    name: Publish Python packages on PyPI
    if: (github.event_name == 'release' && startsWith(github.ref, 'refs/tags')) || (github.event_name == 'workflow_dispatch')
    needs: [build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/versioned-hdf5
    permissions:
      id-token: write
    steps:
      - name: Retrieve wheels and sdist
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: wheels/

      - name: print artifacts
        run: |
          ls -l wheels/

      - name: 🧪 Publish to PyPI Testing
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ inputs.test_pypi }}
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: wheels

      - name: 🎉 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ !inputs.test_pypi }}
        with:
          packages-dir: wheels
